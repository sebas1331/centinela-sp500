name: Escaneo post-cierre

# Objetivo: ~18:00 ET (bien después del cierre de 16:00). Varios crons UTC por
# DST y por los retrasos del cron de Actions (que llegan a superar las 2 h).
#   22:00 UTC = 18:00 EDT (verano)   |   23:00 UTC = 18:00 EST (invierno)
# Aquí la ventana no tiene techo (basta con que hayan pasado >=30 min del
# cierre), así que un retraso nunca hace daño; los disparos extra son un seguro
# por si GitHub descarta alguno. El script es IDEMPOTENTE: el primero que entre
# hace el trabajo y los demás terminan sin hacer nada.
on:
  schedule:
    - cron: "0 22 * * 1-5"
    - cron: "30 22 * * 1-5"
    - cron: "0 23 * * 1-5"
    - cron: "30 23 * * 1-5"
  workflow_dispatch:
    inputs:
      forzar:
        description: "Forzar (ignora ventana e idempotencia)"
        type: boolean
        default: false
      fecha:
        description: "Fecha de sesión YYYY-MM-DD (opcional)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: centinela-escritura
  cancel-in-progress: false

jobs:
  postcierre:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restaurar caché de precios
        uses: actions/cache@v4
        with:
          path: .cache
          key: precios-${{ github.run_id }}
          restore-keys: precios-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Escaneo post-cierre (entradas, salidas, reportes)
        id: escaneo
        run: |
          ARGS=""
          if [ "${{ inputs.forzar }}" = "true" ]; then ARGS="$ARGS --forzar"; fi
          if [ -n "${{ inputs.fecha }}" ]; then ARGS="$ARGS --fecha ${{ inputs.fecha }}"; fi
          python scripts/escaneo_postcierre.py $ARGS

      # Rompe en rojo si el escaneo trabajó pero su salida no llegó al repo.
      - name: Commit y push verificados (bitácora, estado, ATH, reportes)
        run: |
          scripts/commit_y_push.sh \
            "post-cierre: entradas/salidas y reportes [skip ci]" \
            "${{ steps.escaneo.outputs.resultado }}" \
            estado bitacora.csv bitacora.sqlite datos logs reportes
