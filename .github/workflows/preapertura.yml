name: Escaneo pre-apertura

# El cron de Actions corre en UTC, NO entiende el horario de verano (DST) y
# ADEMÁS se retrasa: el 2026-07-20 el disparo de las 12:45 UTC arrancó a las
# 14:57 (2h12m tarde) y el escaneo abortó por ventana con el workflow en verde.
# Por eso no bastan dos horarios: escalonamos varios intentos y dejamos que la
# idempotencia del script decida (el primero que caiga dentro de la ventana
# trabaja, los demás terminan sin hacer nada).
#
# La ventana válida es de 20 a 240 min ANTES de la apertura (09:30 ET):
#   verano (EDT, apertura 13:30 UTC) -> 09:30-13:10 UTC
#   invierno (EST, apertura 14:30 UTC) -> 10:30-14:10 UTC
# Estos cinco disparos caen dentro en ambos regímenes y toleran ~2 h de retraso.
on:
  schedule:
    - cron: "45 10 * * 1-5"
    - cron: "15 11 * * 1-5"
    - cron: "45 11 * * 1-5"
    - cron: "15 12 * * 1-5"
    - cron: "45 12 * * 1-5"
  workflow_dispatch:
    inputs:
      forzar:
        description: "Forzar (ignora ventana e idempotencia)"
        type: boolean
        default: false
      fecha:
        description: "Fecha de sesión YYYY-MM-DD (opcional)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: centinela-escritura
  cancel-in-progress: false

jobs:
  preapertura:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restaurar caché de precios
        uses: actions/cache@v4
        with:
          path: .cache
          key: precios-${{ github.run_id }}
          restore-keys: precios-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Escaneo pre-apertura
        id: escaneo
        run: |
          ARGS=""
          if [ "${{ inputs.forzar }}" = "true" ]; then ARGS="$ARGS --forzar"; fi
          if [ -n "${{ inputs.fecha }}" ]; then ARGS="$ARGS --fecha ${{ inputs.fecha }}"; fi
          python scripts/escaneo_preapertura.py $ARGS

      # Rompe en rojo si el escaneo trabajó pero su salida no llegó al repo.
      - name: Commit y push verificados (bitácora, estado, logs)
        run: |
          scripts/commit_y_push.sh \
            "pre-apertura: decisiones de entrada [skip ci]" \
            "${{ steps.escaneo.outputs.resultado }}" \
            estado bitacora.csv bitacora.sqlite datos logs reportes
